spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:prm_confirm_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:db/h2/schema.sql
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
    discovery:
      enabled: false

prm:
  db-type: MYSQL
  # 测试用本地规则桩 AI(确定性,不依赖实时大模型,避免 aitool 测试因真调 qwen 输出漂移而飘)
  ai:
    provider: stub
  # 单测不启用 RBAC 强制(无 token),与生产/演示隔离
  auth:
    enabled: false
  # 智能确权辅助工具(独立工具)材料存储:测试写临时目录,避免污染仓库
  storage:
    dir: ${java.io.tmpdir}/prm-ait-test

seata:
  enabled: false
