spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:prm_confirm_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:db/h2/schema.sql
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
    discovery:
      enabled: false

prm:
  db-type: MYSQL
  # 智能确权辅助工具(独立工具)材料存储:测试写临时目录,避免污染仓库
  storage:
    dir: ${java.io.tmpdir}/prm-ait-test

seata:
  enabled: false
