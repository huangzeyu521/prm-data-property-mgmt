spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:prm_auth_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:db/h2/schema.sql
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
    discovery:
      enabled: false

prm:
  db-type: MYSQL
  # 单测确定性:先确后授网关强制走本地桩(避免与宿主机运行中的 confirm 容器耦合)
  confirm:
    gateway: stub

seata:
  enabled: false
