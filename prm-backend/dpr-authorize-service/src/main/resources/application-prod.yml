# 生产环境(信创):达梦 DM8 + Nacos + Sentinel + Seata。需引入达梦 JDBC 驱动后启用。
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/prm_dpr?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root123}
  sql:
    init:
      mode: never
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
    discovery:
      enabled: false

prm:
  db-type: MYSQL

seata:
  enabled: false
  application-id: dpr-authorize-service
  tx-service-group: prm_tx_group
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      namespace: ${NACOS_NS:prm}
