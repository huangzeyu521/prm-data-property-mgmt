server:
  port: 9103

spring:
  application:
    name: dpr-authorize-service
  profiles:
    # 本地/演示默认 dev(H2,可独立运行);部署用环境变量 SPRING_PROFILES_ACTIVE=prod 覆盖(MySQL)。
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # 指引/协议等原件上传:与确权侧对齐(单文件 500MB、整体 2GB),否则默认 1MB 会拦下指引 PDF
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 2GB

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

prm:
  # RBAC 强制:默认开启(生产/演示,@RequiresRole 端点逐角色校验,如批量清单终批仅领导小组);
  # 单测走 test profile 置 false(兼容既有无 token MockMvc 调用)。PRM_AUTH_ENABLED 可显式覆盖。
  auth:
    enabled: ${PRM_AUTH_ENABLED:true}
  # 大瓦特 AI 接入:provider=stub 本地规则桩(默认,离线);provider=qwen 接阿里云百炼 qwen3.7-max
  # 先确后授真实校验:HTTP 查 confirm 服务卡片实况(不可达回退桩)
  confirm:
    base-url: ${PRM_CONFIRM_URL:http://host.docker.internal:9102}
  ai:
    provider: ${PRM_AI_PROVIDER:qwen}
    base-url: ${PRM_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${QWEN_MODEL_NAME:qwen3.7-max-2026-06-08}
    api-key: ${DASHSCOPE_API_KEY:}
  db-type: MYSQL
  # P0-① 台账回写:默认关闭(本地桩,离线/测试);PRM_LEDGER_WB=true 启用 HTTP 回写台账服务
  ledger:
    writeback-enabled: ${PRM_LEDGER_WB:false}
    writeback-url: ${PRM_LEDGER_URL:http://host.docker.internal:9101}

logging:
  level:
    com.csg.prm: debug

# 健康端点细节(排查/演示):展示各组件健康状态
management:
  endpoint:
    health:
      show-details: always
  health:
    # 本地/演示无 Nacos 服务器,禁用其健康指示器避免整体 DOWN;接入真实 Nacos 的环境用环境变量覆盖开启
    nacos-config:
      enabled: false
    nacos-discovery:
      enabled: false
