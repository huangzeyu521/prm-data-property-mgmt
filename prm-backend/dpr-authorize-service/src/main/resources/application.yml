server:
  port: 9103

spring:
  application:
    name: dpr-authorize-service
  profiles:
    # 本地/演示默认 dev(H2,可独立运行);部署用环境变量 SPRING_PROFILES_ACTIVE=prod 覆盖(MySQL)。
    active: ${SPRING_PROFILES_ACTIVE:dev}

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

prm:
  db-type: MYSQL
  # P0-① 台账回写:默认关闭(本地桩,离线/测试);PRM_LEDGER_WB=true 启用 HTTP 回写台账服务
  ledger:
    writeback-enabled: ${PRM_LEDGER_WB:false}
    writeback-url: ${PRM_LEDGER_URL:http://host.docker.internal:9101}

logging:
  level:
    com.csg.prm: debug
