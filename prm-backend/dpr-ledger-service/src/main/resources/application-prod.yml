# 生产环境(信创):达梦 DM8 + Nacos + Sentinel + Seata。
# 注意:达梦 JDBC 驱动 DmJdbcDriver18 不在 Maven 中央仓,需由达梦官方仓库/本地仓引入后启用以下依赖与配置。
spring:
#  datasource:
#    driver-class-name: dm.jdbc.driver.DmDriver
#    url: jdbc:dm://127.0.0.1:5236/PRM_DPR
#    username: ${DM_USER:PRM_DPR}
#    password: ${DM_PWD:}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/prm_dpr?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root123}
  sql:
    init:
      mode: never
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
    discovery:
      enabled: false

prm:
  db-type: MYSQL

seata:
  enabled: false
  application-id: dpr-ledger-service
  tx-service-group: prm_tx_group
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      namespace: ${NACOS_NS:prm}
