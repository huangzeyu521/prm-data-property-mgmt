server:
  port: 9101

spring:
  application:
    name: dpr-ledger-service
  profiles:
    # 本地/演示默认 dev(H2,可独立运行);部署用环境变量 SPRING_PROFILES_ACTIVE=prod 覆盖(MySQL)。
    active: ${SPRING_PROFILES_ACTIVE:dev}

# MyBatis-Plus 全局配置
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

# 分页方言:dev/test=MYSQL(H2),prod=DM(达梦)。见各 profile 覆盖。
prm:
  # 大瓦特 AI 接入:provider=stub 本地规则桩(默认,离线);provider=qwen 接阿里云百炼 qwen3.7-max
  ai:
    provider: ${PRM_AI_PROVIDER:qwen}
    base-url: ${PRM_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${QWEN_MODEL_NAME:qwen3.7-max-2026-06-08}
    api-key: ${DASHSCOPE_API_KEY:sk-c3eb88a1b7734b1f95b1df957b120dde}
  db-type: MYSQL
  # P0-② 跨域聚合(资产360 / 统一待办):默认关闭(本地空桩,离线/单测仅台账本地数据);
  # PRM_AGG=true 时经 HTTP 跨服务读取确权/授权,实现一屏贯通。
  aggregate:
    enabled: ${PRM_AGG:false}
    confirm-url: ${PRM_CONFIRM_URL:http://host.docker.internal:9102}
    auth-url: ${PRM_AUTH_URL:http://host.docker.internal:9103}

logging:
  level:
    com.csg.prm: debug

# 健康端点细节(排查/演示):展示各组件健康状态
management:
  endpoint:
    health:
      show-details: always
  health:
    # 本地/演示无 Nacos 服务器,禁用其健康指示器避免整体 DOWN;接入真实 Nacos 的环境用环境变量覆盖开启
    nacos-config:
      enabled: false
    nacos-discovery:
      enabled: false
