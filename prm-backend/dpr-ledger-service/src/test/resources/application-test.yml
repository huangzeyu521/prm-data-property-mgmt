# 测试环境:H2 内存库 + 全离线(无 Nacos/Seata/Sentinel 依赖)。
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:prm_dpr_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:db/h2/schema.sql
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
    discovery:
      enabled: false

prm:
  db-type: MYSQL

seata:
  enabled: false
